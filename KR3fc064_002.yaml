body:
  text: 測量舊法用表用重表用三表四表西法用鏡用盂水用矩尺用套竿用覆笠用矩度用象限儀罔弗貫幽入微僃臻美善然皆有待于算未有不煩布算一量即得者衡少喜泰西家學熟測量諸法年來走京師遊觀象臺獲睹儀象諸巨製伏讀御製數理精蘊御製曆象考成上下二編及後編御定儀象考成究心六宗三要反復探索茅塞頓開輒以鄙意創為句股尺其制長方即句股相乘之積面畫橫縱諸線凡山嶽樓臺城郭之高川谷之深土田道里之遠一測而得不煩布算但數尺面縱橫各格即得真距無分秒差亦奇器也輒繪圖立説得十二法集為一編間以示李雲門先生先生曰測量算法之極功也以尺則擯算法而不馭測量智者所難能也以尺則下愚優為之子曩作開方表百乘方如
  hash: sha256:8f5f8c375a92374bf9337e56abfdcd5e26bd8cbf1069ffa980415a01ef8f56b5
