body:
  text: 造尺尺以堅木為之或範銅其形為帶縱方即句股相乘之羃積斜剖之為兩句股句股為正方角故尺四角務取極方凡測物必用正方角否則不得真度下測遠第二圖鋭角形特借測耳非尺之本用也厚寸許廣狹長短無定度面界縱橫各方線愈細則測愈密尺厚處每邊施母螺轉孔各二孔距度每邊必等所以受托版之箝與斜測時納窺管之背之釘者也尺角尺角四每角凹入分許以受矩角之針管見下圖矩角以銅為之厚分廣各寸高視其尺之厚內隅磬折處綴銅管如甲管孔細如髮欲其受針也針也者窺管之針也角之面各作母螺轉孔如丑孔洞于尺角之
  hash: sha256:960190c7d095cb22a4fe5542ddc50bae78ed856f0b21e875d674d8bd2244c749
