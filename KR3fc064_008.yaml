body:
  text: 體用時以矩角附尺角以公螺轉二箝之若釘然不用釘而用螺轉者欲其移此角作彼角也若四角各作距角則用釘便窺管以銅作薄管小而圓取極直管內廣徑分愈細則測愈眞望而視之欲其無窒也任以一爲底底綴銅線一貫管之兩端線也者以爲弦也故取極直其一端視管寸許磬折下垂與管作正方角形謂之針以入矩角之孔也欲其利轉也管背綴小銅釘二長半寸釘矩度如尺厚邊母螺轉距度斜測時以釘入尺厚邊螺轉孔使窺望也
  hash: sha256:1824450666f58a3708c423fddccf4bfa1d250c3dbb00d6a3a6f4f5cafb43dc3b
