body:
  text: 體用時以矩角附尺角以公螺轉二箝之若釘然不用釘而用螺轉者欲其移此角作彼角也若四角各作距角則用釘便窺管以銅作薄管小而圓取極直管內廣徑分愈細則測愈真望而視之欲其無窒也任以一為底底綴銅線一貫管之兩端線也者以為弦也故取極直其一端視管寸許磬折下垂與管作正方角形謂之針以入矩角之孔也欲其利轉也管背綴小銅釘二長半寸釘矩度如尺厚邊母螺轉距度斜測時以釘入尺厚邊螺轉孔使窺望也
  hash: sha256:ca2adfc4c145b04fa9e157efd9e0d50894b7941716e739f861aac3a03dee8011
