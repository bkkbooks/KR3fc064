body:
  text: 托版托版所以安尺者以木爲之廣若尺之厚有二孔孔距度與尺厚邊母螺轉孔距度必等用時置尺于版以公螺轉箝之箝尺版爲一版端施屈戌著于竿聯版竿爲一版與竿張翕任意竿用木銳其下或更施鐵觜令可植于地竿內向版處上下作十數齟齬以受支片支片者支托版置齟齬上下移就令其可低可昂以定尺以取端直也置尺法置尺務直以其爲正方角也必于尺背厚邊施線任其兩端下垂以取眞度尺載于托版以螺轉箝之
