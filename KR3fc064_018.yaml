body:
  text: 句股尺測高第一法知乙丙之距而測甲乙之高置尺以角齊丙邊平乙窺管從丙指以墨作斜線識之乃自丙甲數至癸令丙癸之度如丙乙之距或兩倍或三倍或以分當丈或以二分當丈或以三分當丈次作壬癸小線壬癸之度即甲乙之矩也蓋以丙癸當丙乙則壬癸即當甲乙自平測高
