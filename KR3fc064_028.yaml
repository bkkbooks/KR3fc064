body:
  text: 句股尺測高第六法山頂甲山脚丁人立于甲欲測甲丁之高而無可據之遠但山下與丁平行處有戊有已知其相距之度則于甲置尺測之以窺管指戊指已俱以墨作線次于子丑小線當戊已平行之至乙則丑乙當已丁而甲乙當甲丁矣借山下兩遠測本山之高
