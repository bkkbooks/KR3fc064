body:
  text: 句股尺測遠第二法人在甲測乙而兩旁無餘地可作正方角則任指一可測之地如丁作乙甲丁銳角形借句股尺重測之先測于丁置尺右角齊丁左邊平甲窺管指乙而出于庚以墨作線記之次測于甲置尺卽用前尺左角齊甲右邊平丁窺管指乙而出于辛亦以墨作線記之而庚辛兩線相遇于壬得壬甲丁小銳角形則小丁甲當大丁甲而丁壬當丁乙甲壬當甲乙矣平面測遠銳角形
