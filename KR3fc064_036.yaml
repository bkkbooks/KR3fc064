body:
  text: 句股尺測遠第四法欲測甲乙之遠而乙之根為物所掩如山麓有小阜或為林木蔽阻之類難得真距若用兩測甲外又無餘地惟望有高如戊為山顚上有石臺臺上有塔如丁丁戊之高原有定距借以為用從甲測丁又測戊乃作壬癸丙小直線以壬癸當丁戊則癸丙如戊乙而甲丙如甲乙矣用高上之高測遠
