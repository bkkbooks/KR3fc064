body:
  text: 句股尺測遠第四法欲測甲乙之遠而乙之根爲物所掩如山麓有小阜或爲林木蔽阻之類難得眞距若用兩測甲外又無餘地惟望有高如戊爲山顚上有石臺臺上有塔如丁丁戊之高原有定距借以爲用從甲測丁又測戊乃作壬癸丙小直線以壬癸當丁戊則癸丙如戊乙而甲丙如甲乙矣用高上之高測遠
