body:
  text: 句股尺測遠第五法第六法重測欲測乙甲之遠而不知戊甲之廣則用重測先測于丁線出辛後測于戊線出庚次作壬癸丙橫線以壬癸當丁戊則癸丙當戊甲而戊丙當乙甲矣欲測戊甲之遠而不知乙甲之高則借乙之高以為據而重測之先後兩測法同上測不知廣之遠借不知之高測遠此法巧妙絶倫
