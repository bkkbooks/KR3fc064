body:
  text: 直置法所測之度大于所知之度則是以句測股也則直置其尺斜置法或不欲正測或不能正測則于窺管背二小釘入尺邊孔目從管窺所測之物帶尺上下移就之次于尺之昂角以線鎮重物下垂俟定卽得眞度矣案前横直置尺二法俱以管當弦此法以垂線當弦前二法尺定而弦移此則弦定而尺移其理同也
