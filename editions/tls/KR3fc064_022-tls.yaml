body:
  text: 句股尺測高第三法重測欲測甲丁之高而不知已丁之遠則用重測先測人立于己置尺角齊己窺管指甲而出于庚後測退立于戊置尺角齊于戊窺管指甲而出于辛庚辛兩線俱以墨記之乃于兩線中以戊己矩數約之作壬癸小線平引之至丙蓋壬癸當戊已則壬丙當己丁而丙戊當甲丁矣測不知遠之高
