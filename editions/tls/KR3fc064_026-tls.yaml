body:
  text: 句股尺測高第五法重測山頂如甲山脚如丁欲知本山甲丁之高而又無可據以爲算之遠但山有樓或塔如乙量得甲乙之距則用重測以句股尺任指山脚一處如戊先測于甲窺管指戊而出于辛後測于乙窺管指戊而出于庚乃于辛庚兩線中以甲乙矩數約之作壬癸小線直引之至丙則壬癸當甲乙而壬丙當甲丁乙丙亦卽當戊丁從高測不知遠之高
